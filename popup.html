<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Link Scraper</title>
  <style>
    :root {
      --bg: #111315;
      --panel: #171a1d;
      --panel-2: #1e2328;
      --border: #2a3036;
      --text: #edf2f7;
      --muted: #9aa4af;
      --accent: #ff7a1a;
      --accent-soft: rgba(255, 122, 26, 0.14);
      --danger: #ff5a6b;
      --success: #22c55e;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 120px;
      max-height: 580px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.4 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #191d21 0%, #14171a 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 16px;
      border: 1px solid rgba(255, 122, 26, 0.2);
      flex: 0 0 auto;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 11px;
      margin-top: 1px;
    }

    .icon-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn,
    .tab,
    .primary-btn,
    .secondary-btn,
    .mini-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .icon-btn:hover,
    .tab:hover,
    .secondary-btn:hover,
    .mini-btn:hover {
      border-color: #3a434c;
      background: var(--panel-2);
      color: var(--text);
    }

    .icon-btn.active {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: rgba(255, 122, 26, 0.3);
    }

    .section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tab {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .tab.active {
      color: var(--text);
      background: var(--panel-2);
      border-color: #3a434c;
      box-shadow: var(--shadow);
    }

    .input-row {
      display: none;
      gap: 8px;
      margin-top: 12px;
    }

    .input-row.visible {
      display: flex;
    }

    .url-input,
    .filter-input {
      width: 100%;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
    }

    .url-input {
      padding: 10px 12px;
      min-width: 0;
    }

    .filter-input {
      padding: 8px 10px;
      font-size: 12px;
    }

    .url-input:focus,
    .filter-input:focus {
      border-color: rgba(255, 122, 26, 0.45);
      box-shadow: 0 0 0 3px rgba(255, 122, 26, 0.12);
    }

    .url-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255, 90, 107, 0.12);
    }

    .primary-btn {
      padding: 10px 14px;
      white-space: nowrap;
      background: var(--accent);
      border-color: transparent;
      color: #1a1209;
      font-weight: 700;
    }

    .primary-btn:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .primary-btn:disabled,
    .secondary-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .status {
      display: none;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 10px 14px 0;
    }

    .status.visible {
      display: flex;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--muted);
      flex: 0 0 auto;
    }

    .status-dot.active { background: var(--success); }
    .status-dot.error { background: var(--danger); }

    .content {
      display: flex;
      flex-direction: column;
      min-height: 320px;
      max-height: 420px;
      padding: 12px 14px 0;
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .summary-left {
      min-width: 0;
    }

    .summary-count {
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .list {
      overflow: auto;
      padding-right: 2px;
      margin-right: -2px;
      border-top: 1px solid var(--border);
    }

    .list::-webkit-scrollbar { width: 6px; }
    .list::-webkit-scrollbar-thumb { background: #313841; border-radius: 999px; }
    .list::-webkit-scrollbar-track { background: transparent; }

    .link-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .link-item:last-child { border-bottom: none; }

    .link-item:hover .link-name {
      color: #ffffff;
    }

    .ext-badge {
      min-width: 48px;
      padding: 4px 8px;
      border-radius: 999px;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(255, 122, 26, 0.25);
    }

    .link-info {
      min-width: 0;
    }

    .link-name,
    .link-url {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .link-url {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .link-actions {
      display: flex;
      gap: 6px;
    }

    .mini-btn {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .mini-btn.copy-done {
      border-color: rgba(34, 197, 94, 0.35);
      color: var(--success);
      background: rgba(34, 197, 94, 0.08);
    }

    .empty,
    .loading {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    .empty-card,
    .loading-card {
      width: 100%;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      padding: 24px 18px;
    }

    .empty-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .empty-title {
      color: var(--text);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .empty-sub {
      font-size: 12px;
      line-height: 1.5;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #313841;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px 14px;
      border-top: 1px solid var(--border);
      background: #14171a;
    }

    .footer-note {
      color: var(--muted);
      font-size: 11px;
      min-width: 0;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .secondary-btn {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%) translateY(8px);
      background: #1f2937;
      color: var(--text);
      border: 1px solid #323944;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: 0.18s ease;
      white-space: nowrap;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: rgba(255, 90, 107, 0.14);
      border-color: rgba(255, 90, 107, 0.3);
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">🎬</div>
        <div class="brand-copy">
          <div class="brand-title">Video Link Scraper</div>
          <div class="brand-subtitle">Simple video link finder</div>
        </div>
      </div>
      <div class="icon-actions">
        <button class="icon-btn" id="btnHighlight" title="Highlight links on page">🔦</button>
        <button class="icon-btn" id="btnRefresh" title="Refresh scan">↻</button>
      </div>
    </header>

    <section class="section">
      <div class="tabs">
        <button class="tab active" data-tab="current">Current tab</button>
        <button class="tab" data-tab="custom">Custom URL</button>
      </div>
      <div class="input-row" id="customInputRow">
        <input class="url-input" id="urlInput" placeholder="example.com/video-page" />
        <button class="primary-btn" id="btnScrape">Scrape</button>
      </div>
    </section>

    <div class="status" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText"></span>
    </div>

    <main id="main" class="content">
      <div class="loading">
        <div class="loading-card">
          <div class="spinner"></div>
          <div>Scanning for video links…</div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-note" id="footerNote">MP4 · WebM · M3U8 · MOV · AVI · MKV</div>
      <div class="footer-actions">
        <button class="secondary-btn" id="btnCopyAll" disabled>Copy all</button>
        <button class="secondary-btn" id="btnOpenAll" disabled>Open all</button>
      </div>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
